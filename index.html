<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VECTRA — Flight Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg-void: #020408;
    --bg-card: #0a1520;
    --bg-card-hover: #0f1e2e;
    --accent-cyan: #00d4ff;
    --accent-cyan-dim: #0099bb;
    --accent-green: #00ff9d;
    --accent-amber: #ffaa00;
    --border-subtle: rgba(0, 212, 255, 0.12);
    --border-active: rgba(0, 212, 255, 0.4);
    --text-primary: #e0f4ff;
    --text-secondary: rgba(180, 220, 240, 0.6);
    --text-dim: rgba(100, 160, 190, 0.4);
    --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
    --glow-green: 0 0 20px rgba(0, 255, 157, 0.3);
    --grid-line: rgba(0, 212, 255, 0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-void); color:var(--text-primary); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; z-index:0; background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

  .corner-deco { position:fixed; width:80px; height:80px; z-index:1; pointer-events:none; }
  .corner-deco::before,.corner-deco::after { content:''; position:absolute; background:var(--accent-cyan); }
  .corner-deco.tl{top:0;left:0} .corner-deco.tl::before{top:0;left:0;width:2px;height:40px} .corner-deco.tl::after{top:0;left:0;width:40px;height:2px}
  .corner-deco.tr{top:0;right:0} .corner-deco.tr::before{top:0;right:0;width:2px;height:40px} .corner-deco.tr::after{top:0;right:0;width:40px;height:2px}
  .corner-deco.bl{bottom:0;left:0} .corner-deco.bl::before{bottom:0;left:0;width:2px;height:40px} .corner-deco.bl::after{bottom:0;left:0;width:40px;height:2px}
  .corner-deco.br{bottom:0;right:0} .corner-deco.br::before{bottom:0;right:0;width:2px;height:40px} .corner-deco.br::after{bottom:0;right:0;width:40px;height:2px}

  header { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:12px 32px; border-bottom:1px solid var(--border-subtle); background:linear-gradient(180deg,rgba(0,20,40,0.95) 0%,rgba(0,10,20,0.8) 100%); backdrop-filter:blur(10px); }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-icon svg { width:34px; height:34px; }
  .logo-text { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; letter-spacing:6px; color:var(--accent-cyan); text-shadow:var(--glow-cyan); }
  .logo-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:3px; margin-top:2px; }
  .header-status { display:flex; align-items:center; gap:24px; }
  .status-item { display:flex; flex-direction:column; align-items:flex-end; }
  .status-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:2px; }
  .status-value { font-family:'Orbitron',monospace; font-size:13px; font-weight:500; color:var(--accent-cyan); }
  .live-badge { display:flex; align-items:center; gap:8px; padding:6px 14px; border:1px solid var(--accent-green); background:rgba(0,255,157,0.06); clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--accent-green); box-shadow:var(--glow-green); animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .live-text { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; color:var(--accent-green); letter-spacing:3px; }

  .main { position:relative; z-index:5; display:grid; grid-template-columns:330px 1fr; height:calc(100vh - 61px); }

  .sidebar { background:rgba(6,13,20,0.97); border-right:1px solid var(--border-subtle); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header { padding:16px 18px 12px; border-bottom:1px solid var(--border-subtle); display:flex; justify-content:space-between; align-items:center; }
  .section-title { font-family:'Orbitron',monospace; font-size:10px; font-weight:500; letter-spacing:4px; color:var(--accent-cyan); display:flex; align-items:center; gap:8px; }
  .section-title::before { content:''; width:3px; height:12px; background:var(--accent-cyan); box-shadow:var(--glow-cyan); }
  .aircraft-list { flex:1; overflow-y:auto; padding:8px; }
  .aircraft-list::-webkit-scrollbar { width:3px; }
  .aircraft-list::-webkit-scrollbar-thumb { background:var(--accent-cyan-dim); border-radius:2px; }

  .aircraft-card { position:relative; margin-bottom:6px; padding:13px 15px; background:var(--bg-card); border:1px solid var(--border-subtle); cursor:pointer; transition:all 0.2s; clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px)); }
  .aircraft-card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent); opacity:0; transition:opacity 0.2s; }
  .aircraft-card:hover,.aircraft-card.selected { background:var(--bg-card-hover); border-color:var(--border-active); }
  .aircraft-card:hover::before,.aircraft-card.selected::before { opacity:1; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .tail-number { font-family:'Orbitron',monospace; font-size:15px; font-weight:700; color:var(--text-primary); letter-spacing:2px; }
  .flight-status { display:flex; align-items:center; gap:5px; padding:3px 10px; font-family:'Share Tech Mono',monospace; font-size:9px; clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%); }
  .flight-status.active { background:rgba(0,255,157,0.1); border:1px solid rgba(0,255,157,0.3); color:var(--accent-green); }
  .flight-status.inactive { background:rgba(100,140,160,0.08); border:1px solid rgba(100,140,160,0.15); color:var(--text-dim); }
  .status-dot { width:5px; height:5px; border-radius:50%; }
  .active .status-dot { background:var(--accent-green); animation:pulse 1.4s infinite; }
  .inactive .status-dot { background:var(--text-dim); }
  .card-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .stat-block { display:flex; flex-direction:column; gap:2px; }
  .stat-lbl { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:1.5px; }
  .stat-val { font-family:'Orbitron',monospace; font-size:12px; font-weight:500; color:var(--accent-cyan); }
  .stat-val.na { color:var(--text-dim); font-size:11px; }
  .card-route { margin-top:9px; padding-top:9px; border-top:1px solid var(--border-subtle); display:flex; align-items:center; gap:6px; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-secondary); }

  .sidebar-footer { padding:12px 18px; border-top:1px solid var(--border-subtle); background:rgba(0,212,255,0.02); }
  .footer-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .footer-stat { display:flex; flex-direction:column; gap:2px; }
  .footer-stat-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:2px; }
  .footer-stat-value { font-family:'Orbitron',monospace; font-size:18px; font-weight:700; }
  .fv-green { color:var(--accent-green); text-shadow:var(--glow-green); }
  .fv-cyan  { color:var(--accent-cyan);  text-shadow:var(--glow-cyan); }
  .fv-sm    { font-size:11px; color:var(--text-secondary); }

  .map-container { position:relative; overflow:hidden; }
  #map { width:100%; height:100%; }

  .map-overlay { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:500; }
  .map-top-bar { position:absolute; top:14px; left:14px; right:14px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }

  .selected-panel { background:rgba(4,10,18,0.93); border:1px solid var(--border-active); backdrop-filter:blur(14px); padding:15px 18px; min-width:290px; clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%); pointer-events:all; }
  .sap-label { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:3px; margin-bottom:6px; }
  .sap-tail  { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--accent-cyan); text-shadow:var(--glow-cyan); letter-spacing:3px; margin-bottom:12px; }
  .sap-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .sap-stat  { display:flex; flex-direction:column; gap:2px; }
  .sap-stat-label { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:1px; }
  .sap-stat-value { font-family:'Orbitron',monospace; font-size:14px; font-weight:600; color:var(--text-primary); }
  .sap-stat-unit  { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--accent-cyan-dim); margin-left:2px; }
  .sap-route { margin-top:10px; padding-top:10px; border-top:1px solid var(--border-subtle); display:flex; align-items:center; gap:8px; font-family:'Orbitron',monospace; font-size:11px; font-weight:500; color:var(--text-primary); letter-spacing:2px; }
  .route-line { flex:1; height:1px; background:linear-gradient(90deg,var(--accent-cyan-dim),transparent); position:relative; }
  .route-line::after { content:'▶'; position:absolute; right:0; top:50%; transform:translateY(-50%); color:var(--accent-cyan-dim); font-size:7px; }

  .map-controls { display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:all; }
  .refresh-btn { background:rgba(0,212,255,0.08); border:1px solid var(--border-active); color:var(--accent-cyan); font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; padding:8px 14px; cursor:pointer; clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); transition:all 0.2s; }
  .refresh-btn:hover { background:rgba(0,212,255,0.16); box-shadow:var(--glow-cyan); }
  .last-updated { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:1px; text-align:right; }

  .activity-panel { position:absolute; bottom:14px; left:14px; width:270px; background:rgba(4,10,18,0.9); border:1px solid var(--border-subtle); backdrop-filter:blur(12px); pointer-events:all; }
  .activity-header { padding:8px 12px; border-bottom:1px solid var(--border-subtle); font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px; color:var(--accent-cyan); display:flex; align-items:center; gap:6px; }
  .activity-header::before { content:''; width:2px; height:9px; background:var(--accent-cyan); }
  .activity-log { padding:6px; max-height:110px; overflow-y:auto; }
  .activity-log::-webkit-scrollbar { width:2px; }
  .activity-log::-webkit-scrollbar-thumb { background:var(--accent-cyan-dim); }
  .log-entry { display:flex; align-items:baseline; gap:6px; padding:3px 5px; border-bottom:1px solid rgba(0,212,255,0.04); animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
  .log-time { color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:8px; white-space:nowrap; }
  .log-msg  { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-secondary); line-height:1.4; }
  .log-msg .lc { color:var(--accent-cyan); }
  .log-msg .lg { color:var(--accent-green); }
  .log-msg .la { color:var(--accent-amber); }

  .traffic-counter { position:absolute; bottom:14px; right:14px; background:rgba(4,10,18,0.9); border:1px solid var(--border-subtle); padding:10px 16px; text-align:right; pointer-events:none; }
  .tc-label { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:2px; }
  .tc-value { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--accent-amber); }

  .map-compass { position:absolute; bottom:105px; right:18px; width:56px; height:56px; pointer-events:none; }
  .map-compass svg { width:56px; height:56px; }

  .scan-line { position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent); opacity:0.25; animation:scan 5s ease-in-out infinite; pointer-events:none; z-index:600; }
  @keyframes scan { 0%{top:0%;opacity:0.45} 50%{opacity:0.1} 100%{top:100%;opacity:0.45} }

  /* LEAFLET */
  .leaflet-container { background:#03080f !important; }
  .leaflet-control-zoom,.leaflet-control-attribution { display:none !important; }

  /* AIRPORT PINS */
  .apt-pin { display:flex; flex-direction:column; align-items:center; }
  .apt-icon { width:20px; height:20px; background:rgba(4,10,18,0.85); border:1.5px solid rgba(0,212,255,0.45); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; box-shadow:0 0 7px rgba(0,212,255,0.2); transition:all 0.2s; }
  .apt-label { font-family:'Orbitron',monospace; font-size:7px; color:rgba(0,212,255,0.75); letter-spacing:1px; margin-top:1px; background:rgba(4,10,18,0.7); padding:1px 3px; white-space:nowrap; }

  /* POPUPS */
  .vectra-popup .leaflet-popup-content-wrapper { background:transparent !important; border:none !important; box-shadow:none !important; padding:0 !important; }
  .vectra-popup .leaflet-popup-content { margin:0 !important; }
  .vectra-popup .leaflet-popup-tip-container { display:none; }
  .vectra-popup .leaflet-popup-close-button { color:#00d4ff !important; top:5px !important; right:8px !important; font-size:14px !important; background:transparent !important; }
  .vpop { font-family:'Rajdhani',sans-serif; background:#060d14; border:1px solid rgba(0,212,255,0.3); padding:12px 16px; min-width:190px; box-shadow:0 0 20px rgba(0,212,255,0.1); }
  .vpop-fleet { display:inline-block; padding:2px 8px; background:rgba(0,255,157,0.12); border:1px solid rgba(0,255,157,0.35); color:#00ff9d; font-size:9px; letter-spacing:2px; margin-bottom:7px; font-family:'Share Tech Mono',monospace; }
  .vpop-call { font-family:'Orbitron',monospace; font-size:17px; font-weight:700; color:#00d4ff; letter-spacing:2px; margin-bottom:2px; }
  .vpop-sub  { font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(100,160,190,0.6); letter-spacing:1px; margin-bottom:10px; }
  .vpop-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .vpop-sl   { font-family:'Share Tech Mono',monospace; font-size:8px; color:rgba(100,160,190,0.5); letter-spacing:1px; }
  .vpop-sv   { font-family:'Orbitron',monospace; font-size:13px; color:#e0f4ff; }
  .vpop-su   { font-size:8px; color:#0099bb; }
</style>
</head>
<body>

<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,2 34,30 2,30" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
        <polygon points="18,8 28,26 8,26" fill="none" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="18" cy="18" r="3" fill="#00d4ff"/>
        <line x1="18" y1="2" x2="18" y2="34" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
        <line x1="2" y1="18" x2="34" y2="18" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">VECTRA</div>
      <div class="logo-sub">FLIGHT OPERATIONS CENTER</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-item">
      <span class="status-label">UTC</span>
      <span class="status-value" id="utc-clock">--:--:--</span>
    </div>
    <div class="status-item">
      <span class="status-label">LIVE TRAFFIC</span>
      <span class="status-value" id="live-count" style="color:var(--accent-amber)">—</span>
    </div>
    <div class="status-item">
      <span class="status-label">SOURCE</span>
      <span class="status-value" style="font-size:10px;color:var(--accent-amber)">OPENSKY</span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="section-title">Fleet Registry</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim)">7 AIRCRAFT</span>
    </div>
    <div class="aircraft-list" id="aircraft-list"></div>
    <div class="sidebar-footer">
      <div class="footer-grid">
        <div class="footer-stat">
          <span class="footer-stat-label">AIRBORNE</span>
          <span class="footer-stat-value fv-green" id="active-count">0</span>
        </div>
        <div class="footer-stat">
          <span class="footer-stat-label">FLEET</span>
          <span class="footer-stat-value fv-cyan">7</span>
        </div>
        <div class="footer-stat" style="grid-column:span 2">
          <span class="footer-stat-label">LAST SYNC</span>
          <span class="footer-stat-value fv-sm" id="last-sync">AWAITING...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="scan-line"></div>

    <div class="map-overlay">
      <div class="map-top-bar">
        <div class="selected-panel">
          <div class="sap-label">SELECTED AIRCRAFT</div>
          <div class="sap-tail" id="sap-tail">—</div>
          <div class="sap-stats">
            <div class="sap-stat">
              <span class="sap-stat-label">ALTITUDE</span>
              <span class="sap-stat-value"><span id="sap-alt">—</span><span class="sap-stat-unit" id="sap-alt-u"></span></span>
            </div>
            <div class="sap-stat">
              <span class="sap-stat-label">GND SPD</span>
              <span class="sap-stat-value"><span id="sap-spd">—</span><span class="sap-stat-unit" id="sap-spd-u"></span></span>
            </div>
            <div class="sap-stat">
              <span class="sap-stat-label">HEADING</span>
              <span class="sap-stat-value"><span id="sap-hdg">—</span></span>
            </div>
          </div>
          <div class="sap-route">
            <span id="sap-orig">—</span>
            <div class="route-line"></div>
            <span id="sap-dest">—</span>
          </div>
        </div>
        <div class="map-controls">
          <button class="refresh-btn" onclick="fullRefresh()">⟳ REFRESH</button>
          <div class="last-updated" id="last-updated">—</div>
        </div>
      </div>

      <div class="activity-panel">
        <div class="activity-header">Activity Log</div>
        <div class="activity-log" id="activity-log"></div>
      </div>

      <div class="traffic-counter">
        <div class="tc-label">LIVE AIRCRAFT</div>
        <div class="tc-value" id="tc-value">—</div>
      </div>

      <div class="map-compass">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
          <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(0,212,255,0.07)" stroke-width="0.5"/>
          <polygon points="32,5 35,30 32,26 29,30" fill="#00d4ff" opacity="0.9"/>
          <polygon points="32,59 35,34 32,38 29,34" fill="rgba(0,212,255,0.3)"/>
          <polygon points="5,32 30,29 26,32 30,35"  fill="rgba(0,212,255,0.3)"/>
          <polygon points="59,32 34,29 38,32 34,35" fill="rgba(0,212,255,0.3)"/>
          <circle cx="32" cy="32" r="2.5" fill="#00d4ff"/>
          <text x="32" y="3.5" text-anchor="middle" fill="#00d4ff" font-family="Orbitron" font-size="5" font-weight="700">N</text>
          <text x="32" y="62"  text-anchor="middle" fill="rgba(0,212,255,0.4)" font-family="Orbitron" font-size="5">S</text>
          <text x="62" y="33"  text-anchor="middle" fill="rgba(0,212,255,0.4)" font-family="Orbitron" font-size="5">E</text>
          <text x="2"  y="33"  text-anchor="middle" fill="rgba(0,212,255,0.4)" font-family="Orbitron" font-size="5">W</text>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const TAIL_NUMBERS    = ['N353JK','N336RS','N2837X','N75600','N733XL','N5713R','N8125B'];
const TRAFFIC_REFRESH = 20000;
const FLEET_REFRESH   = 60000;

// ==================== STATE ====================
let map;
let selectedTail = null;
let fleetData    = {};
let fleetMarkers = {}, fleetPaths = {}, fleetTrails = {};
let liveMarkers  = {};

TAIL_NUMBERS.forEach(t => {
  fleetData[t]  = { tail:t, active:false, lat:null, lon:null, alt:null, speed:null, heading:null, origin:null, dest:null };
  fleetTrails[t]= [];

// ==================== MAP ====================
function initMap() {
  map = L.map('map', { center:[37.5,-96], zoom:5, zoomControl:false, attributionControl:false });

  // ESRI satellite — free, no API key, CORS-safe, always works in browser
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:19, opacity:1 }
  ).addTo(map);

  // Labels / boundaries overlay
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:19, opacity:0.5 }
  ).addTo(map);

  addAirportPins();
  logMsg('SYS','Satellite map ready — loading traffic...','lc');
}

function addAirportPins() {
  AIRPORTS.forEach(ap => {
    const icon = L.divIcon({
      html:`<div class="apt-pin"><div class="apt-icon">✈</div><div class="apt-label">${ap.id}</div></div>`,
      className:'', iconSize:[36,28], iconAnchor:[18,10]
    });
    L.marker([ap.lat,ap.lon],{icon,zIndexOffset:0})
      .addTo(map)
      .bindPopup(
        `<div class="vpop"><div class="vpop-call">${ap.id}</div><div class="vpop-sub">AIRPORT · ${ap.lat.toFixed(4)}°N ${Math.abs(ap.lon).toFixed(4)}°W</div></div>`,
        {className:'vectra-popup',maxWidth:200}
      );
  });
}

// ==================== LIVE GLOBAL TRAFFIC ====================
async function fetchLiveTraffic() {
  try {
    // OpenSky public REST API — no key, CORS-enabled
    const res = await fetch('https://opensky-network.org/api/states/all', {
      signal: AbortSignal.timeout(14000)
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (!data||!data.states) throw new Error('empty');

    const seen = new Set();
    let count  = 0;

    data.states.forEach(s => {
      const icao      = s[0];
      const callsign  = (s[1]||'').trim().replace(/\s+/g,'') || icao;
      const lon       = s[5], lat = s[6];
      const altM      = s[7];
      const onGround  = s[8];
      const speedMs   = s[9];
      const hdg       = s[10] ? Math.round(s[10]) : 0;
      const country   = s[2]||'';

      if (!lat||!lon||onGround) return;
      seen.add(icao); count++;

      const altFt   = altM   ? Math.round(altM   * 3.28084) : null;
      const speedKt = speedMs? Math.round(speedMs * 1.94384) : null;
      const isFleet = TAIL_NUMBERS.includes(callsign);

      const icon = makeIcon(hdg, isFleet);

      if (liveMarkers[icao]) {
        liveMarkers[icao].setLatLng([lat,lon]);
        liveMarkers[icao].setIcon(icon);
      } else {
        const m = L.marker([lat,lon],{icon, zIndexOffset: isFleet?900:5})
          .addTo(map)
          .bindPopup(()=>makePopup(callsign,icao,altFt,speedKt,hdg,country,isFleet),
            {className:'vectra-popup',maxWidth:240});
        if (isFleet) {
          m.on('click',()=>selectAircraft(callsign));
        }
        liveMarkers[icao] = m;
      }
      liveMarkers[icao]._meta = {callsign,altFt,speedKt,hdg,country,isFleet};

      // Sync fleet data from live feed
      if (isFleet) {
        fleetData[callsign] = {
          tail:callsign, active:true, lat, lon,
          alt:altFt, speed:speedKt, heading:hdg,
          origin:null, dest:null
        };
      }
    });

    // Remove stale markers
    Object.keys(liveMarkers).forEach(icao => {
      if (!seen.has(icao)) { map.removeLayer(liveMarkers[icao]); delete liveMarkers[icao]; }
    });

    // Update fleet trails & sidebar
    TAIL_NUMBERS.forEach(t => {
      const ac = fleetData[t];
      if (ac.active && ac.lat && ac.lon) {
        fleetTrails[t].push([ac.lat,ac.lon]);
        if (fleetTrails[t].length>80) fleetTrails[t].shift();
        if (fleetPaths[t]) map.removeLayer(fleetPaths[t]);
        if (fleetTrails[t].length>1) {
          fleetPaths[t] = L.polyline(fleetTrails[t],{color:'#00ff9d',weight:2,opacity:0.5,dashArray:'5,8'}).addTo(map);
        }
      }
    });

    renderSidebar();
    if (selectedTail) updatePanel();

    const ts = new Date().toISOString().substr(11,8)+' UTC';
    document.getElementById('live-count').textContent = count.toLocaleString();
    document.getElementById('tc-value').textContent   = count.toLocaleString();
    document.getElementById('last-sync').textContent  = ts;
    document.getElementById('last-updated').textContent = 'Synced '+ts;
    document.getElementById('active-count').textContent = TAIL_NUMBERS.filter(t=>fleetData[t].active).length;

    logMsg('TRAFFIC',`${count.toLocaleString()} aircraft live`,'la');
  } catch(e) {
    logMsg('TRAFFIC','Feed timeout — will retry','la');
  }
}

function makeIcon(heading, isFleet) {
  const a = heading||0;
  if (isFleet) {
    return L.divIcon({
      html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" style="transform:rotate(${a}deg);filter:drop-shadow(0 0 7px #00ff9d)">
        <polygon points="16,2 20,24 16,20 12,24" fill="#00ff9d" opacity="0.95"/>
        <polygon points="16,14 28,22 16,18 4,22"  fill="#00ff9d" opacity="0.7"/>
        <polygon points="16,20 20,28 16,26 12,28" fill="#00ff9d" opacity="0.5"/>
        <circle cx="16" cy="16" r="2.5" fill="#00ff9d"/>
      </svg>`,
      className:'', iconSize:[32,32], iconAnchor:[16,16]
    });
  }
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14" style="transform:rotate(${a}deg)">
      <polygon points="7,1 8.5,10 7,8.5 5.5,10"  fill="rgba(180,220,255,0.82)"/>
      <polygon points="7,6 13,10 7,8 1,10"        fill="rgba(180,220,255,0.5)"/>
      <polygon points="7,9 8.5,13 7,12 5.5,13"    fill="rgba(180,220,255,0.35)"/>
    </svg>`,
    className:'', iconSize:[14,14], iconAnchor:[7,7]
  });
}

function makePopup(callsign, icao, altFt, speedKt, hdg, country, isFleet) {
  return `<div class="vpop">
    ${isFleet?'<div class="vpop-fleet">★ FLEET AIRCRAFT</div>':''}
    <div class="vpop-call">${callsign}</div>
    <div class="vpop-sub">ICAO: ${icao.toUpperCase()}${country?' · '+country:''}</div>
    <div class="vpop-grid">
      <div><div class="vpop-sl">ALT</div><div class="vpop-sv">${altFt!=null?altFt.toLocaleString():'—'}<span class="vpop-su">${altFt!=null?' ft':''}</span></div></div>
      <div><div class="vpop-sl">SPD</div><div class="vpop-sv">${speedKt!=null?speedKt:'—'}<span class="vpop-su">${speedKt!=null?' kt':''}</span></div></div>
      <div><div class="vpop-sl">HDG</div><div class="vpop-sv">${hdg!=null?hdg+'°':'—'}</div></div>
    </div>
  </div>`;
}

// ==================== SIDEBAR ====================
function renderSidebar() {
  const list = document.getElementById('aircraft-list');
  list.innerHTML = '';
  TAIL_NUMBERS.forEach(tail => {
    const ac   = fleetData[tail];
    const card = document.createElement('div');
    card.className = 'aircraft-card'+(selectedTail===tail?' selected':'');
    card.id = 'card-'+tail;
    card.onclick = () => selectAircraft(tail);
    const altTxt = ac.active&&ac.alt   !=null ? ac.alt.toLocaleString() : '—';
    const spdTxt = ac.active&&ac.speed !=null ? ac.speed                : '—';
    const hdgTxt = ac.active&&ac.heading!=null? ac.heading+'°'          : '—';
    card.innerHTML = `
      <div class="card-top">
        <span class="tail-number">${tail}</span>
        <span class="flight-status ${ac.active?'active':'inactive'}">
          <span class="status-dot"></span>${ac.active?'AIRBORNE':'GROUNDED'}
        </span>
      </div>
      <div class="card-stats">
        <div class="stat-block"><span class="stat-lbl">ALT</span>
          <span class="stat-val ${!ac.active?'na':''}">${altTxt}<span style="font-size:8px;color:var(--accent-cyan-dim)">${ac.active&&ac.alt?'ft':''}</span></span></div>
        <div class="stat-block"><span class="stat-lbl">GS</span>
          <span class="stat-val ${!ac.active?'na':''}">${spdTxt}<span style="font-size:8px;color:var(--accent-cyan-dim)">${ac.active&&ac.speed?'kt':''}</span></span></div>
        <div class="stat-block"><span class="stat-lbl">HDG</span>
          <span class="stat-val ${!ac.active?'na':''}">${hdgTxt}</span></div>
      </div>
      ${ac.active?`<div class="card-route"><span>${ac.origin||'—'}</span><span style="color:var(--accent-cyan-dim);margin:0 4px">──▶</span><span>${ac.dest||'—'}</span></div>`:''}
    `;
    list.appendChild(card);
  });
}

// ==================== SELECT + PANEL ====================
function selectAircraft(tail) {
  selectedTail = tail;
  document.querySelectorAll('.aircraft-card').forEach(c=>c.classList.remove('selected'));
  const card = document.getElementById('card-'+tail);
  if (card) card.classList.add('selected');
  updatePanel();
  const ac = fleetData[tail];
  if (ac&&ac.lat&&ac.lon) map.flyTo([ac.lat,ac.lon],9,{duration:1.5});
}

function updatePanel() {
  const ac = selectedTail ? fleetData[selectedTail] : null;
  document.getElementById('sap-tail').textContent = selectedTail||'—';
  if (ac&&ac.active) {
    document.getElementById('sap-alt').textContent   = ac.alt   !=null ? ac.alt.toLocaleString() : '—';
    document.getElementById('sap-alt-u').textContent = ac.alt   !=null ? ' ft'  : '';
    document.getElementById('sap-spd').textContent   = ac.speed !=null ? ac.speed: '—';
    document.getElementById('sap-spd-u').textContent = ac.speed !=null ? ' kts' : '';
    document.getElementById('sap-hdg').textContent   = ac.heading!=null? ac.heading+'°':'—';
    document.getElementById('sap-orig').textContent  = ac.origin||'UNKNOWN';
    document.getElementById('sap-dest').textContent  = ac.dest  ||'UNKNOWN';
  } else {
    document.getElementById('sap-alt').textContent   = '—';
    document.getElementById('sap-alt-u').textContent = '';
    document.getElementById('sap-spd').textContent   = ac&&!ac.active?'GROUNDED':'—';
    document.getElementById('sap-spd-u').textContent = '';
    document.getElementById('sap-hdg').textContent   = '—';
    document.getElementById('sap-orig').textContent  = '—';
    document.getElementById('sap-dest').textContent  = '—';
  }
}

// ==================== LOG ====================
function logMsg(src, msg, cls) {
  const log = document.getElementById('activity-log');
  const t   = new Date().toISOString().substr(11,8);
  const e   = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = `<span class="log-time">${t}</span><span class="log-msg"><span class="${cls||''}">${src}</span> ${msg}</span>`;
  log.prepend(e);
  while (log.children.length>25) log.removeChild(log.lastChild);
}

// ==================== REFRESH ====================
function fullRefresh() { fetchLiveTraffic(); }

// ==================== CLOCK ====================
function tickClock() {
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  document.getElementById('utc-clock').textContent=`${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())}`;
}

// ==================== BOOT ====================
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  renderSidebar();
  updatePanel();
  tickClock();
  setInterval(tickClock, 1000);

  selectedTail = TAIL_NUMBERS[0];
  renderSidebar();

  // First load
  fetchLiveTraffic();
  setInterval(fetchLiveTraffic, TRAFFIC_REFRESH);

  logMsg('SYS','VECTRA online — monitoring 7 aircraft','lc');
});
</script>
